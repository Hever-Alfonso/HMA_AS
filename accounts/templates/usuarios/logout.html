{% extends 'core/base.html' %}

{% block title %}Sesión Terminada - UNLABELED{% endblock %}

{% block content %}
<section class="container" style="max-width: 600px; margin: 80px auto; text-align: center;">
    <div style="background:#1a1a1a; border-radius:8px; padding:50px 30px; border:1px solid #333;">
        <h1 class="section-title" style="margin-top:0; font-size:2rem; margin-bottom: 20px; color:#fff;">Sesión Terminada</h1>
        <p style="color:#aaa; font-size:1.1rem; margin-bottom: 30px;">
            Has cerrado tu sesión exitosamente. Gracias por visitar UNLABELED.
        </p>
        
        <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
            <a href="{% url 'accounts:login' %}" class="btn btn-secondary" style="border:1px solid #333; color:#fff;">Ingresar de nuevo</a>
            <a href="{% url 'core:home' %}" class="btn" style="background:#fff; color:#000; border-color:#fff;">Volver al inicio</a>
        </div>
    </div>
</section>
{% endblock %}
